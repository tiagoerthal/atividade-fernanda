<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Variáveis JS</title>
</head>
<body>

<script>
    let texto = "Olá mundo";   // string
    let inteiro = 10;          // int
    let decimal = 5.5;         // float
    let booleano = true;       // boolean

    alert("Valor: " + texto + " | Tipo: " + typeof texto);
    alert("Valor: " + inteiro + " | Tipo: " + typeof inteiro);
    alert("Valor: " + decimal + " | Tipo: " + typeof decimal);
    alert("Valor: " + booleano + " | Tipo: " + typeof booleano);

    console.log("Valor:", texto, "| Tipo:", typeof texto);
    console.log("Valor:", inteiro, "| Tipo:", typeof inteiro);
    console.log("Valor:", decimal, "| Tipo:", typeof decimal);
    console.log("Valor:", booleano, "| Tipo:", typeof booleano);
</script>

</body>
</html>
