<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Formulário Moderno</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1>Cadastro</h1>

    <form method="POST" action="#">

        <fieldset>
            <legend>Informações básicas</legend>

            <div class="grupo">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div class="grupo">
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>

        </fieldset>

        <fieldset>
            <legend>Informações adicionais</legend>

            <div class="grupo">
                <span>Gênero</span>
                <label><input type="radio" name="genero" value="masculino"> Masculino</label>
                <label><input type="radio" name="genero" value="feminino"> Feminino</label>
                <label><input type="radio" name="genero" value="outro"> Outro</label>
            </div>

            <div class="grupo">
                <span>Interesses</span>
                <label><input type="checkbox" name="interesses" value="tecnologia"> Tecnologia</label>
                <label><input type="checkbox" name="interesses" value="esportes"> Esportes</label>
                <label><input type="checkbox" name="interesses" value="musica"> Música</label>
                <label><input type="checkbox" name="interesses" value="jogos"> Jogos</label>
            </div>

            <div class="grupo">
                <label for="pais">País</label>
                <select id="pais" name="pais">
                    <option>Brasil</option>
                    <option>Portugal</option>
                    <option>Estados Unidos</option>
                </select>
            </div>

        </fieldset>

        <fieldset>
            <legend>Outros campos</legend>

            <div class="grupo">
                <label for="foto">Foto de perfil</label>
                <input type="file" id="foto" name="foto">
            </div>

            <div class="grupo">
                <label for="cor">Cor favorita</label>
                <input type="color" id="cor" name="cor">
            </div>

            <div class="grupo">
                <label for="satisfacao">Nível de satisfação</label>
                <input type="range" id="satisfacao" name="satisfacao" min="0" max="10">
            </div>

        </fieldset>

        <fieldset>
            <legend>Mensagem</legend>

            <div class="grupo">
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" name="mensagem"></textarea>
            </div>

        </fieldset>

        <div class="botoes">
            <button type="submit">Enviar</button>
            <button type="reset" class="limpar">Limpar</button>
        </div>

    </form>
</div>

</body>
</html>
