<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pizzaria Futurista</title>
  
</head>
<body>

<div class="container">
  <h1>🍕 Pizzaria Neon</h1>

  <form>
    <label>Nome:</label>
    <input type="text" required>

    <label>Email:</label>
    <input type="email" required>

    <label>Telefone:</label>
    <input type="tel">

    <label>Endereço:</label>
    <textarea rows="2"></textarea>

    <label>Tamanho da Pizza:</label>
    <select>
      <option>Pequena</option>
      <option>Média</option>
      <option>Grande</option>
      <option>Gigante</option>
    </select>

    <label>Sabor:</label>
    <select>
      <option>Calabresa</option>
      <option>Frango com Catupiry</option>
      <option>Quatro Queijos</option>
      <option>Portuguesa</option>
      <option>Chocolate</option>
    </select>

    <label>Borda:</label>
    <div class="radio-group">
      <label><input type="radio" name="borda"> Sem borda</label>
      <label><input type="radio" name="borda"> Catupiry</label>
      <label><input type="radio" name="borda"> Cheddar</label>
    </div>

    <label>Extras:</label>
    <div class="checkbox-group">
      <label><input type="checkbox"> Bacon</label>
      <label><input type="checkbox"> Queijo extra</label>
      <label><input type="checkbox"> Azeitona</label>
      <label><input type="checkbox"> Molho especial</label>
    </div>

    <label>Bebida:</label>
    <select>
      <option>Refrigerante</option>
      <option>Suco</option>
      <option>Água</option>
      <option>Energético</option>
    </select>

    <label>Data de entrega:</label>
    <input type="date">

    <label>Hora de entrega:</label>
    <input type="time">

    <label>Observações:</label>
    <textarea rows="3"></textarea>

    <button type="submit">Finalizar Pedido 🚀</button>
  </form>
</div>

</body>
</html>
